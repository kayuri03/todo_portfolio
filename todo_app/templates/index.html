<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Portfolio | Dashboard</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}?v=4.0">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel" style="padding: 20px;">
            <div class="profile-section">
                <div class="avatar-container" id="profile-avatar">
                    {% if user.avatar_url %}
                        <img src="{{ user.avatar_url }}" class="avatar-img" id="avatar-image-el">
                    {% else %}
                        <div class="avatar-initials" id="avatar-initials-el">{{ user.email[0]|upper }}</div>
                    {% endif %}
                    <div class="avatar-overlay">
                        <label for="avatar-upload" style="cursor:pointer; font-size:11px; display:block; width:100%;">Upload</label>
                        <input type="file" id="avatar-upload" accept="image/*" style="display:none;">
                    </div>
                </div>
                <div class="profile-info">
                    <span class="profile-name" style="font-weight:600; font-size:1.1rem;">{{ user.email.split('@')[0] }}</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul id="filter-nav">
                    <li class="active" data-filter="today">☀️ My Day</li>
                    <li data-filter="week">📅 Next 7 Days</li>
                    <li data-filter="all">📋 All My Tasks</li>
                    <li data-filter="archived" style="margin-top: 20px; color: var(--text-muted);">📦 Archived Tasks</li>
                </ul>

                <!-- v0.7.1 Custom Lists Layout Refactor -->
                <div class="sidebar-lists-section">
                    <div id="lists-header-container" title="Toggle My Lists" style="display:flex; justify-content:space-between; align-items:center; color: var(--text-muted); padding: 5px 16px; margin-bottom: 5px; cursor: pointer; flex-shrink: 0;">
                        <span style="font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">My Lists</span>
                        <div style="display:flex; gap: 12px; align-items:center;">
                            <span id="trigger-add-list" style="font-weight:bold; font-size: 1.2rem; transition: color 0.2s; display: inline-block;" title="Create New List">+</span>
                            <span id="lists-toggle-icon" style="transition: transform 0.2s;">⮟</span>
                        </div>
                    </div>
                    
                    <div id="add-list-container" style="display:none; padding: 0 16px; margin-bottom: 10px; gap: 4px; flex-shrink: 0;">
                        <input type="text" id="new-list-input" placeholder="Type name..." autocomplete="off" style="flex: 1; border: none; background: rgba(0,0,0,0.2); color: white; font-size: 0.85rem; outline: none; border-radius: 6px; padding: 8px;">
                        <button type="button" id="submit-list-btn" title="Add List" style="padding: 0 12px; border-radius: 6px; background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; font-size: 0.9rem; display:none;">✓</button>
                    </div>

                    <div id="custom-lists-container">
                        <ul id="custom-lists-nav" style="list-style:none; display:flex; flex-direction:column; gap:2px;">
                        </ul>
                    </div>
                </div>
            </nav>

            <a href="{{ url_for('auth.logout') }}" class="logout-btn" title="Sign Out">Logout</a>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content glass-panel">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; text-align: left;">
                <h1 id="view-title" style="margin-bottom:0;">My Day</h1>
                <div class="view-toggle" style="display: flex; gap: 4px; align-items: center; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 8px;">
                    <button id="toggle-list-view" class="view-btn active" style="padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; color: white; background: rgba(59, 130, 246, 0.5); transition: all 0.2s;">☰ List</button>
                    <button id="toggle-board-view" class="view-btn" style="padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; background: transparent; color: var(--text-muted); transition: all 0.2s;">◫ Board</button>
                </div>
            </header>

            <!-- Interactive Trigger -->
            <div id="trigger-add-task" class="add-task-trigger">
                <span class="add-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </span>
                <span style="font-weight: 500;">Add Task</span>
            </div>

            <!-- Dynamic Input Form -->
            <form id="todo-form" style="display: none;">
                <input type="text" id="task-input" placeholder="What needs to be done?" required autocomplete="off">
                <input type="date" id="task-due-date" class="date-picker">
                <select id="task-priority" class="priority-select">
                    <option value="None">Priority</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
                <div style="display:flex; gap:8px;">
                    <button type="button" id="cancel-add-btn" class="secondary-btn">Cancel</button>
                    <button type="submit" id="add-btn">Add</button>
                </div>
            </form>

            <ul id="task-list">
                <!-- Tasks injected here -->
            </ul>

            <div id="kanban-board" class="kanban-container" style="display: none;">
                <div class="kanban-column" data-status="todo">
                    <div class="kanban-header">To Do</div>
                    <ul class="kanban-task-list"></ul>
                </div>
                <div class="kanban-column" data-status="in-progress">
                    <div class="kanban-header">In Progress</div>
                    <ul class="kanban-task-list"></ul>
                </div>
                <div class="kanban-column" data-status="done">
                    <div class="kanban-header">Done</div>
                    <ul class="kanban-task-list"></ul>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/tasks.js') }}?v=4.0"></script>
</body>
</html>
