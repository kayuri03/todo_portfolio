<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | To-Do Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <main class="container glass-panel auth-panel">
        <header>
            <h1>Welcome Back</h1>
            <p>Sign in to manage your tasks</p>
        </header>

        <form id="auth-form" class="auth-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submit-btn">Login</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="{{ url_for('pages.register') }}">Sign up here</a></p>
        <p id="error-msg" class="error-msg" style="display: none;"></p>
    </main>

    <script>
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if (res.ok) {
                window.location.href = '/';
            } else {
                errorMsg.innerText = data.error || 'Login failed';
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            errorMsg.innerText = 'Server error occurred.';
            errorMsg.style.display = 'block';
        }
    });
    </script>
</body>
</html>
